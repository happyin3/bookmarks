<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>bookmarks</title>

    <!-- css -->
    <link rel="stylesheet" href="https://cdn.bootcss.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <link rel="stylesheet" href="https://getbootstrap.com/docs/4.0/examples/sticky-footer/sticky-footer.css">

    <style>
        .div-container-body {
            padding-top: 30px;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <!-- Image and text -->
        <nav class="navbar navbar-light bg-light">
            <span class="navbar-brand mb-0 h1">bookmarks</span>
        </nav>
    </div>
    <div class="bodyer">
        <div class="container-fluid div-container-body"></div>
    </div>
    <div class="footer">
        <footer class="footer">
            <div class="container-fluid">powered by happyin3</div>
        </footer>
    </div>
    <!-- javascript -->
    <!--<script src="https://cdn.bootcss.com/jquery/3.2.1/jquery.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>-->
    <script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdn.bootcss.com/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.bootcss.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

    <script src="https://cdn.bootcss.com/juicer/0.6.15/juicer-min.js"></script>

    <script type="text/juicer" id="bookmarks-tpl">
        <div class="list-group">
            {@each links as item}
                <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" target="_blank" href="${item.link}">
                    ${item.title}
                    {@each item.tags as tag}
                        <span class="badge badge-primary badge-pill">${tag}</span>
                    {@/each}
                </a>
            {@/each}
        </div>
    </script>

    <script>
        var data = {
            'links': [
                {'title': 'title', 'link': 'link', 'tags': ['1']},
                {'title': 'title', 'link': 'link', 'tags': ['1']},
                {'title': 'title', 'link': 'link', 'tags': ['1']},
                {'title': 'title', 'link': 'link', 'tags': ['1']},
                {'title': 'title', 'link': 'link', 'tags': ['1']},
                {'title': 'title', 'link': 'link', 'tags': ['1']},
            ]
        } 

        $.ajax({
            type: 'GET',
            url: '/api/bookmarks/',
            dataType: 'json',
            success: function(res){
                var data = res; 

                var tpl = document.getElementById('bookmarks-tpl').innerHTML;
                var html = juicer(tpl, data);

                $('.div-container-body').html(html);
            }
        });
    </script>
</body>
</html>
